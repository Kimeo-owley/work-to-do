<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#D4537E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Work To Do"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Work To Do</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F1;--card:#FFFFFF;--border:#ECEAE4;--border2:#D8D5CC;
  --text:#1A1916;--text2:#6B6860;--text3:#A8A59E;
  --pink:#F4C0D1;--pink2:#C94B72;--pink3:#FBE8EF;
  --red-bg:#FDF0F0;--red:#8B1F1F;
  --green-bg:#EDF5E8;--green:#1E5C2A;
  --accent:#C94B72;
  --radius:10px;--radius-sm:7px;--radius-pill:20px;
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.shell{max-width:680px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* 헤더 */
.app-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.app-title{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.app-sub{font-size:12px;color:var(--text3);margin-top:3px;letter-spacing:.2px}

/* 탭 */
.tabs{display:flex;gap:2px;background:var(--border);border-radius:var(--radius-pill);padding:3px;margin-bottom:2rem}
.tab{flex:1;padding:9px 4px;border:none;border-radius:18px;font-size:12px;font-family:inherit;font-weight:500;background:transparent;color:var(--text3);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:4px;letter-spacing:.1px}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* 요약 */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:2rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem .75rem;text-align:center;box-shadow:var(--shadow)}
.stat-n{font-size:24px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}

/* 버튼 */
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:7px 16px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.1px}
.btn:hover{background:var(--border);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#b03d62;border-color:#b03d62}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.btn-icon:hover{background:var(--border);color:var(--red)}
.btn-icon-sm{width:20px;height:20px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-icon-sm:hover{background:var(--border);color:var(--red)}
.row-end{display:flex;justify-content:flex-end;margin-bottom:.85rem;gap:8px}

/* 프로젝트 카드 */
.project-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.proj-top{display:flex;align-items:center;gap:10px;padding:1rem 1.1rem .7rem;flex-wrap:wrap}
.proj-name-wrap{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:600;cursor:pointer;border:1px solid transparent;border-radius:5px;padding:2px 5px;margin:-2px -5px;transition:all .15s;display:inline-block;max-width:100%;letter-spacing:-.2px}
.proj-name:hover{border-color:var(--border2);background:var(--bg)}
.proj-name-input{font-size:14px;font-weight:600;border:1px solid var(--accent);border-radius:5px;padding:2px 5px;font-family:inherit;outline:none;width:100%;background:var(--card);color:var(--text)}
.proj-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap;letter-spacing:.2px}

/* 진행바 */
.prog-area{padding:0 1.1rem .6rem;position:relative;height:50px}
.prog-track{position:absolute;bottom:8px;left:1.1rem;right:1.1rem;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.cat-wrap{position:absolute;bottom:0;transition:left .4s ease;line-height:0}

/* 섹션 */
.section-block{border-top:1px solid var(--border)}
.section-header{display:flex;align-items:center;gap:8px;padding:.55rem 1.1rem;cursor:pointer;user-select:none}
.section-header:hover{background:#FAFAF8}
.section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.section-name{font-size:11px;font-weight:600;color:var(--text2);flex:1;text-transform:uppercase;letter-spacing:.6px}
.section-count{font-size:11px;color:var(--text3);font-weight:400}
.section-chevron{font-size:9px;color:var(--text3);transition:transform .2s}
.section-chevron.open{transform:rotate(90deg)}
.section-body{display:none;padding:4px 1.1rem .65rem}
.section-body.open{display:block}
.section-name-input{font-size:11px;font-weight:600;border:1px solid var(--accent);border-radius:4px;padding:2px 7px;font-family:inherit;outline:none;background:var(--card);color:var(--text);text-transform:uppercase;letter-spacing:.5px}

/* 섹션 추가 */
.add-section-bar{display:flex;align-items:center;gap:6px;padding:.55rem 1.1rem;border-top:1px solid var(--border)}
.add-section-input{flex:1;font-size:12px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.add-section-input:focus{border-color:var(--accent)}

/* 할일 */
.todos{display:flex;flex-direction:column;gap:3px;padding-top:3px}
.todo-item{display:flex;align-items:flex-start;gap:8px;padding:7px 6px;border-radius:var(--radius-sm);background:var(--bg);position:relative;touch-action:none}
.todo-item.dragging{opacity:.35;background:var(--border)}
.todo-item.drag-over{border-top:2px solid var(--accent)}
.todo-item.overdue{background:#FEF8F8}
.drag-handle{color:var(--text3);font-size:11px;cursor:grab;padding:0 1px;margin-top:3px;flex-shrink:0;opacity:.5}
.paw-btn{width:26px;height:26px;flex-shrink:0;cursor:pointer;background:none;border:none;padding:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.paw-btn:active{transform:scale(.82)}
.todo-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.todo-main{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.todo-text{font-size:13px;line-height:1.45;flex:1;word-break:break-all;color:var(--text)}
.todo-text.done{text-decoration:line-through;color:var(--text3)}
.todo-tag{font-size:10px;padding:1px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;font-weight:600;letter-spacing:.2px}
.todo-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.todo-date{font-size:11px;color:var(--text3)}
.todo-date.overdue{color:var(--red);font-weight:500}
.todo-memo-text{font-size:11px;color:var(--text2);line-height:1.4;white-space:pre-wrap;word-break:break-all}
.repeat-badge{font-size:10px;padding:1px 6px;border-radius:5px;background:#EEF4FE;color:#2B5BA8;white-space:nowrap;font-weight:500}

/* 추가 폼 */
.add-todo-area{padding:.5rem 1.1rem .85rem;border-top:1px solid var(--border)}
.add-todo-row1{display:flex;gap:6px;margin-bottom:6px}
.todo-input{flex:1;font-size:13px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.todo-input:focus{border-color:var(--accent)}
.add-todo-row2{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sel{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;outline:none}
.date-input{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:var(--bg);color:var(--text);font-family:inherit;outline:none}
.date-input:focus,.sel:focus{border-color:var(--accent)}
.memo-input{width:100%;font-size:12px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;outline:none;resize:none;margin-top:4px}
.memo-input:focus{border-color:var(--accent)}

/* 새 프로젝트 */
.new-proj-form{background:var(--card);border:1px dashed var(--border2);border-radius:var(--radius);padding:1.1rem;margin-bottom:10px;display:none;flex-direction:column;gap:10px;box-shadow:var(--shadow)}
.new-proj-form.open{display:flex}
.cat-pick-row{display:flex;gap:8px;flex-wrap:wrap}
.cat-opt{cursor:pointer;border-radius:var(--radius-sm);padding:4px 6px;border:2px solid transparent;text-align:center;transition:border-color .15s}
.cat-opt.active{border-color:var(--accent)}
.cat-opt-label{font-size:10px;color:var(--text3);margin-top:2px;font-weight:500}
.form-row{display:flex;gap:8px}

/* 히스토리 */
.history-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.history-item:last-child{border-bottom:none}

/* 캘린더 */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.cal-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:1rem}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;padding:5px 0;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.cal-day{min-height:52px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px;cursor:pointer;transition:border-color .15s}
.cal-day:hover{border-color:var(--accent)}
.cal-day.today{border-color:var(--accent);background:var(--pink3)}
.cal-day.other-month{opacity:.35}
.cal-day-num{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px}
.cal-dot-wrap{display:flex;flex-wrap:wrap;gap:2px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-events{display:flex;flex-direction:column;gap:6px}
.cal-event-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.7rem .9rem;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow)}
.cal-event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.cal-event-info{flex:1;min-width:0}
.cal-event-title{font-size:13px;font-weight:500}
.cal-event-sub{font-size:11px;color:var(--text3);margin-top:2px}
.cal-empty{font-size:13px;color:var(--text3);text-align:center;padding:2.5rem 0}
.selected-date-label{font-size:12px;font-weight:600;margin-bottom:.85rem;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}

/* Notes */
.memo-type-tabs{display:flex;gap:6px;margin-bottom:1rem}
.memo-type-btn{font-size:12px;font-weight:500;padding:6px 16px;border:1px solid var(--border2);border-radius:var(--radius-pill);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.memo-type-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.memo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:8px;box-shadow:var(--shadow)}
.memo-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:.5rem}
.memo-card-meta{flex:1;min-width:0}
.memo-card-title{font-size:14px;font-weight:600;margin-bottom:4px;letter-spacing:-.2px}
.memo-card-tags{display:flex;gap:5px;flex-wrap:wrap}
.memo-card-tag{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--border);color:var(--text2);font-weight:500}
.memo-card-body{font-size:13px;color:var(--text2);white-space:pre-wrap;word-break:break-all;line-height:1.65;margin-top:.5rem}
.memo-card-type{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;margin-bottom:5px;display:inline-block;text-transform:uppercase;letter-spacing:.5px}
.new-memo-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:10px;display:none;flex-direction:column;gap:8px;box-shadow:var(--shadow)}
.new-memo-form.open{display:flex}
.memo-title-input{width:100%;font-size:15px;font-weight:600;padding:6px 0;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-family:inherit;outline:none;letter-spacing:-.2px}
.memo-body-input{width:100%;font-size:13px;padding:6px 0;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none;resize:none;min-height:100px;line-height:1.7}
.memo-form-btns{display:flex;justify-content:flex-end;gap:6px;padding-top:8px;border-top:1px solid var(--border)}
.memo-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* 애니메이션 */
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-28px)}}
@keyframes legWalk{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
@keyframes legRun{0%,100%{transform:rotate(-38deg)}50%{transform:rotate(38deg)}}
@keyframes tailWag{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(18deg)}}
@keyframes tailRun{0%,100%{transform:rotate(15deg)}50%{transform:rotate(55deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-1.5px)}75%{transform:translateX(1.5px)}}

@media(max-width:480px){
  .shell{padding:1.25rem .9rem 5rem}
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .tab{font-size:11px;padding:8px 2px}
  .add-todo-row2{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div class="shell">
  <div class="app-header" style="display:flex;align-items:center;justify-content:space-between">
  <div>
    <div class="app-title">Work To Do</div>
    <div class="app-sub">Meow meow, get to work.</div>
  </div>
  <div id="sync-status" style="font-size:11px;color:var(--text3);font-weight:500"></div>
</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('todo')">🐾 Tasks</button>
    <button class="tab" onclick="switchTab('cal')">📅 Calendar</button>
    <button class="tab" onclick="switchTab('memo')">📝 Notes</button>
    <button class="tab" onclick="switchTab('history')">📦 History</button>
  </div>

  <div class="tab-panel active" id="panel-todo">
    <div class="summary-row" id="summaryRow"></div>
    <div class="row-end">
      <button class="btn" onclick="resetData()" style="color:var(--text3);font-size:12px">Reset</button>
      <button class="btn" onclick="toggleNewProj()">+ New Project</button>
    </div>
    <div class="new-proj-form" id="newProjForm">
      <input class="todo-input" id="newProjName" placeholder="Project name"/>
      <div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Choose your cat</div>
        <div class="cat-pick-row" id="catPickRow"></div>
      </div>
      <div class="form-row">
        <button class="btn btn-primary" onclick="addProject()">Add</button>
        <button class="btn" onclick="toggleNewProj()">Cancel</button>
      </div>
    </div>
    <div id="projectList"></div>
  </div>

  <div class="tab-panel" id="panel-cal">
    <div class="cal-header">
      <button class="btn" onclick="calPrev()">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="selected-date-label" id="selDateLabel"></div>
    <div class="cal-events" id="calEvents"></div>
  </div>

  <div class="tab-panel" id="panel-memo">
    <div class="memo-type-tabs">
      <button class="memo-type-btn active" onclick="switchMemoType('memo')">Notes</button>
      <button class="memo-type-btn" onclick="switchMemoType('meeting')">Meeting Notes</button>
    </div>
    <div class="row-end">
      <button class="btn" onclick="toggleNewMemo()">+ New</button>
    </div>
    <div class="new-memo-form" id="newMemoForm">
      <input class="memo-title-input" id="memoTitleInput" placeholder="Title"/>
      <div class="memo-form-row" id="memoExtraFields"></div>
      <textarea class="memo-body-input" id="memoBodyInput" placeholder="Write something..."></textarea>
      <div class="memo-form-btns">
        <button class="btn btn-primary" onclick="addMemo()">Save</button>
        <button class="btn" onclick="toggleNewMemo()">Cancel</button>
      </div>
    </div>
    <div id="memoList"></div>
  </div>

  <div class="tab-panel" id="panel-history">
    <div id="historyContent"></div>
  </div>
</div>

<script>
/* ── 상수 ── */
const TAGS=[
  {label:'Idea',bg:'#EEEDFE',color:'#3C3489'},
  {label:'Pending',bg:'#FAEEDA',color:'#633806'},
  {label:'Urgent',bg:'#FCEBEB',color:'#791F1F'},
];
const URGENT=2;

const DEFAULT_SECTIONS=['Daily','In Progress','One-off','Long-term'];

const REPEAT_OPTS=[
  {val:'',label:'No repeat'},
  {val:'daily',label:'Daily'},
  {val:'weekly-0',label:'Every Sunday'},
  {val:'weekly-1',label:'Every Monday'},
  {val:'weekly-2',label:'Every Tuesday'},
  {val:'weekly-3',label:'Every Wednesday'},
  {val:'weekly-4',label:'Every Thursday'},
  {val:'weekly-5',label:'Every Friday'},
  {val:'weekly-6',label:'Every Saturday'},
  {val:'monthly',label:'Monthly'},
];

/* 고양이 6종 — 치치/찌루/마루 + 흰/치즈/장모 */
const CAT_TYPES=[
  {id:'calico',  name:'찌루',  desc:'엑조틱·황갈·메롱😛'},
  {id:'black',   name:'마루',  desc:'스코폴드·다크그레이'},
  {id:'tabby',   name:'치치',  desc:'장모·다크브라운'},
  {id:'white',   name:'벼락이',desc:'흰'},
  {id:'orange',  name:'맹이',  desc:'치즈'},
  {id:'tuxedo',  name:'낸시',  desc:'흰+검은'},
];

const SECTION_COLORS=['#1D9E75','#378ADD','#D4537E','#EF9F27','#7F77DD','#D85A30','#639922','#888780'];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function catColors(type){
  return{
    tabby:   {body:'#4A3520',stripe:'#2C2010',fluff:'#E8E4DC',nose:'#C4785A',eye:'#5A8C3A',ear:'#2C2215',earIn:'#5C3D1E'},
    calico:  {body:'#B8894A',stripe:'#8B6A3A',nose:'#5A3A20',eye:'#1A1200',ear:'#8B6A3A',earIn:'#C49A6C',tongue:'#E05870'},
    black:   {body:'#363636',nose:'#484848',eye:'#C8A020',ear:'#252525',earIn:'#333333'},
    white:   {body:'#F1EFE8',nose:'#F4C0D1',eye:'#5BA4D4',ear:'#F1EFE8',earIn:'#F4C0D1'},
    orange:  {body:'#D4814A',stripe:'#B05A20',nose:'#F4C0D1',eye:'#4A7C3F',ear:'#D4814A',earIn:'#E8A070'},
    longhair:{body:'#C8A882',fluff:'#E8D5B8',nose:'#F4C0D1',eye:'#7F77DD',ear:'#C8A882',earIn:'#E8C0A0'},
    tuxedo: {body:'#2C2C2A',chest:'#F1EFE8',nose:'#F4C0D1',eye:'#5BA4D4',ear:'#2C2C2A',earIn:'#444441'},
  }[type]||{body:'#C8A882',nose:'#F4C0D1',eye:'#4A7C3F',ear:'#C8A882',earIn:'#E8B090'};
}

function pawSVG(done){

  try {

  } catch(e) {
    showSyncStatus('offline', 'var(--text3)');

async function loadFromCloud() {
  try {
    showSyncStatus('loading...', 'var(--text3)');
    const res = await fetch(`${SB_URL}/rest/v1/wtd_data?id=eq.main&select=projects,memos`, {
      headers: {
        'apikey': SB_KEY,

      const data = await res.json();
      if(data && data[0]) {
        projects = data[0].projects || [];

    if(t.repeat==='daily') reset=true;
    else if(t.repeat.startsWith('weekly-')&&parseInt(t.repeat.split('-')[1])===dow) reset=true;
    else if(t.repeat==='monthly'&&new Date().getDate()===1) reset=true;
    if(reset&&t.doneAt&&t.doneAt<today){t.done=false;delete t.doneAt;}
  })));
  save();
}
checkRepeats();

/* ─── 탭 ─── */
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['todo','cal','memo','history'][i]===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='cal') renderCal();
  if(id==='memo') renderMemos();
  if(id==='history') renderHistory();
}

/* ─── 요약 ─── */
function renderSummary(){
  const allTodos=projects.flatMap(p=>p.sections.flatMap(s=>s.todos));
  const total=allTodos.length;
  const done=allTodos.filter(t=>t.done).length;
  const overdue=allTodos.filter(t=>!t.done&&isOverdue(t.date)).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('summaryRow').innerHTML=`
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">Done</div></div>
    <div class="stat"><div class="stat-n" style="color:${overdue?'#791F1F':'inherit'}">${overdue}</div><div class="stat-l">Overdue</div></div>
    <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">Progress</div></div>
  `;
}

            <div class="todo-main">

          ${isSecEditing

        <div class="section-body${sec.open?' open':''}">
          <div class="todos">${todosHtml}</div>

    const card=document.createElement('div');
    card.className='project-card';
    card.innerHTML=`
      <div class="proj-top">
        <div style="flex-shrink:0">${catFaceSVG(p.catType,30)}</div>
        <div class="proj-name-wrap">

            ?`<input class="proj-name-input" id="pni-${p.id}" value="${esc(p.name)}" onblur="saveProjName(${p.id})" onkeydown="if(event.key==='Enter')saveProjName(${p.id})"/>`

        <div class="proj-badges">${speedBadge}</div>
        <span style="font-size:12px;color:var(--text3);margin-left:auto">${doneCount}/${total} · ${pct}%</span>
        <button class="btn-icon" onclick="deleteProject(${p.id})">✕</button>
      </div>
      <div class="prog-area">
        <div class="prog-track" style="${trackAnim}">
          <div class="prog-fill" style="width:${pct}%;background:${c.body}aa"></div>
        </div>
        <div class="cat-wrap" style="left:${catLeft}">${catBodySVG(p.catType,speed)}</div>
      </div>
      ${sectionsHtml}
      <div class="add-section-bar">
        <input class="add-section-input" id="asi-${p.id}" placeholder="+ New section..." onkeydown="if(event.key==='Enter')addSection(${p.id})">
        <button class="btn" onclick="addSection(${p.id})" style="font-size:12px;padding:5px 10px">Add</button>

    list.appendChild(card);
    if(isEditing) setTimeout(()=>{const el=document.getElementById(`pni-${p.id}`);if(el){el.focus();el.select();}},30);
    if(editingSecId){const [ep,es]=editingSecId.split('-');if(parseInt(ep)===p.id){setTimeout(()=>{const el=document.getElementById(`sni-${editingSecId}`);if(el){el.focus();el.select();}},30);}}
  });

/* ─── 섹션 ─── */
function toggleSection(pid,sid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const s=p.sections.find(x=>x.id===sid);if(!s)return;
  s.open=!s.open;save();render();
}
function addSection(pid){
  const inp=document.getElementById(`asi-${pid}`);
  const name=inp?inp.value.trim():'';if(!name)return;
  const p=projects.find(x=>x.id===pid);if(!p)return;
  const colorIdx=p.sections.length%SECTION_COLORS.length;
  p.sections.push({id:nextSecId++,name,color:SECTION_COLORS[colorIdx],open:true,todos:[]});
  inp.value='';save();render();
}
function deleteSection(pid,sid){
  const p=projects.find(x=>x.id===pid);if(!p)return;
  if(p.sections.find(s=>s.id===sid)?.todos.length){if(!confirm('All tasks in this section will be deleted. Continue?'))return;}
  p.sections=p.sections.filter(s=>s.id!==sid);save();render();
}
function startEditSec(pid,sid){editingSecId=`${pid}-${sid}`;render();}
function saveSecName(pid,sid){
  const inp=document.getElementById(`sni-${pid}-${sid}`);
  const name=inp?inp.value.trim():'';
  const p=projects.find(x=>x.id===pid);
  const s=p?.sections.find(x=>x.id===sid);
  if(s&&name) s.name=name;
  editingSecId=null;save();render();
}

/* ─── 드래그 ─── */
function dragStart(e,pid,sid,idx){dragState={pid,sid,idx};e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e,pid,sid,idx){
  e.preventDefault();
  if(!dragState||dragState.pid!==pid||dragState.sid!==sid) return;
  document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function dragDrop(e,pid,sid,idx){
  e.preventDefault();
  if(!dragState||dragState.pid!==pid||dragState.sid!==sid||idx===dragState.idx) return;
  const p=projects.find(x=>x.id===pid);
  const s=p?.sections.find(x=>x.id===sid);if(!s)return;
  const moved=s.todos.splice(dragState.idx,1)[0];
  s.todos.splice(idx,0,moved);
  save();render();
}
function dragEnd(){document.querySelectorAll('.todo-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});dragState=null;}

/* ── 터치 드래그 ── */
let touchDrag={active:false,el:null,ghost:null,pid:null,sid:null,idx:null};
function initTouchDrag(){
  document.addEventListener('touchstart',e=>{
    const handle=e.target.closest('.drag-handle');
    if(!handle) return;
    const item=handle.closest('.todo-item');
    if(!item) return;
    e.preventDefault();
    const pid=parseInt(item.dataset.pid);
    const sid=parseInt(item.dataset.sid);
    const idx=parseInt(item.dataset.idx);
    touchDrag={active:true,el:item,pid,sid,idx};
    item.classList.add('dragging');
    const ghost=item.cloneNode(true);
    ghost.style.cssText=`position:fixed;pointer-events:none;opacity:.7;z-index:9999;width:${item.offsetWidth}px;box-shadow:0 8px 24px rgba(0,0,0,.15);border-radius:8px;background:#fff`;
    document.body.appendChild(ghost);
    touchDrag.ghost=ghost;
    const t=e.touches[0];
    ghost.style.left=(t.clientX-item.offsetWidth/2)+'px';
    ghost.style.top=(t.clientY-30)+'px';
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    if(!touchDrag.active) return;
    e.preventDefault();
    const t=e.touches[0];
    touchDrag.ghost.style.left=(t.clientX-touchDrag.el.offsetWidth/2)+'px';
    touchDrag.ghost.style.top=(t.clientY-30)+'px';
    document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('drag-over'));
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const targetItem=under?.closest('.todo-item');
    if(targetItem&&targetItem!==touchDrag.el){
      const tp=parseInt(targetItem.dataset.pid);
      const ts=parseInt(targetItem.dataset.sid);
      if(tp===touchDrag.pid&&ts===touchDrag.sid) targetItem.classList.add('drag-over');
    }
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!touchDrag.active) return;
    const t=e.changedTouches[0];
    const under=document.elementFromPoint(t.clientX,t.clientY);
    const targetItem=under?.closest('.todo-item');
    if(targetItem&&targetItem!==touchDrag.el){
      const tp=parseInt(targetItem.dataset.pid);
      const ts=parseInt(targetItem.dataset.sid);
      const ti=parseInt(targetItem.dataset.idx);
      if(tp===touchDrag.pid&&ts===touchDrag.sid&&ti!==touchDrag.idx){
        const p=projects.find(x=>x.id===touchDrag.pid);
        const s=p?.sections.find(x=>x.id===touchDrag.sid);
        if(s){const moved=s.todos.splice(touchDrag.idx,1)[0];s.todos.splice(ti,0,moved);save();render();}
      }
    }
    touchDrag.ghost?.remove();
    touchDrag.el?.classList.remove('dragging');
    document.querySelectorAll('.todo-item').forEach(el=>el.classList.remove('drag-over'));
    touchDrag={active:false,el:null,ghost:null,pid:null,sid:null,idx:null};
  });
}
initTouchDrag();


/* ─── 프로젝트/할일 ─── */
function startEditProjName(pid){editingProjId=pid;render();}
function saveProjName(pid){

  if(p&&name) p.name=name;
  editingProjId=null;save();render();
}
function toggleTodo(pid,sid,tid){
  const p=projects.find(x=>x.id===pid);
  const s=p?.sections.find(x=>x.id===sid);
  const t=s?.todos.find(x=>x.id===tid);if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?new Date().toISOString().slice(0,10):undefined;
  if(t.done){
    const el=document.getElementById(`item-${pid}-${sid}-${tid}`);
    if(el){const pop=document.createElement('span');pop.style.cssText='position:absolute;left:8px;top:-2px;font-size:16px;pointer-events:none;animation:popUp .8s ease forwards;z-index:10';pop.textContent='🐾';el.appendChild(pop);setTimeout(()=>pop.remove(),850);}
  }
  save();render();
}
function deleteTodo(pid,sid,tid){
  const p=projects.find(x=>x.id===pid);
  const s=p?.sections.find(x=>x.id===sid);
  if(!s)return;
  s.todos=s.todos.filter(x=>x.id!==tid);save();render();
}
function addTodo(pid,sid){
  const inp=document.getElementById(`ti-${pid}-${sid}`);
  const sel=document.getElementById(`ts-${pid}-${sid}`);
  const dateEl=document.getElementById(`td-${pid}-${sid}`);
  const repEl=document.getElementById(`tr-${pid}-${sid}`);
  const memoEl=document.getElementById(`tm-${pid}-${sid}`);
  const text=inp?inp.value.trim():'';if(!text)return;
  const p=projects.find(x=>x.id===pid);
  const s=p?.sections.find(x=>x.id===sid);if(!s)return;
  const isDaily=s.name==='Daily';
  s.todos.push({id:nextTodoId++,text,done:false,tag:isDaily?null:sel?parseInt(sel.value):0,date:isDaily?'':dateEl?dateEl.value:'',repeat:isDaily?'':repEl?repEl.value:'',memo:isDaily?'':memoEl?memoEl.value.trim():''});
  inp.value='';if(dateEl)dateEl.value='';if(memoEl)memoEl.value='';if(repEl)repEl.value='';
  save();render();
  setTimeout(()=>{const el=document.getElementById(`ti-${pid}-${sid}`);if(el)el.focus();},50);
}
function deleteProject(pid){if(!confirm('Delete this project?'))return;projects=projects.filter(x=>x.id!==pid);save();render();}

function renderCatPicker(){

function toggleNewProj(){

function addProject(){

/* ─── 히스토리 ─── */
function renderHistory(){
  const el=document.getElementById('historyContent');
  const allDone=[];
  projects.forEach(p=>p.sections.forEach(s=>s.todos.filter(t=>t.done).forEach(t=>{
    allDone.push({...t,projName:p.name,secName:s.name,projColor:catColors(p.catType).body,secColor:s.color});
  })));
  if(!allDone.length){el.innerHTML=`<div class="cal-empty">No completed tasks yet</div>`;return;}
  allDone.sort((a,b)=>(b.doneAt||'').localeCompare(a.doneAt||''));

      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden">
        ${todos.map(t=>`<div class="history-item" style="padding:7px 12px">
          <span style="width:7px;height:7px;border-radius:50%;background:${t.secColor};flex-shrink:0;display:inline-block"></span>
          <span style="flex:1;word-break:break-all;font-size:13px">${esc(t.text)}</span>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0">${esc(t.projName)} · ${esc(t.secName)}</span>

        </div>`).join('')}

/* ─── 캘린더 ─── */
function getAllTodosWithDate(){
  const out=[];
  projects.forEach(p=>p.sections.forEach(s=>s.todos.forEach(t=>{
    if(t.date&&!t.done) out.push({...t,projName:p.name,secName:s.name,color:catColors(p.catType).body,secColor:s.color});
  })));
  return out;
}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear} / ${calMonth+1}`;
  const startDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const allTodos=getAllTodosWithDate();
  const today=new Date();today.setHours(0,0,0,0);
  let html='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{html+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<startDow;i++) html+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=new Date(ds).getTime()===today.getTime();
    const dayTodos=allTodos.filter(t=>t.date===ds);
    const dots=dayTodos.map(t=>`<div class="cal-dot" style="background:${t.color}"></div>`).join('');
    const sel=selectedCalDate===ds;
    html+=`<div class="cal-day${isToday?' today':''}${sel?' today':''}" onclick="selectCalDate('${ds}')">
      <div class="cal-day-num">${d}</div><div class="cal-dot-wrap">${dots}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderCalEvents();
}
function selectCalDate(d){selectedCalDate=selectedCalDate===d?null:d;renderCal();}
function renderCalEvents(){
  const allTodos=getAllTodosWithDate();
  const label=document.getElementById('selDateLabel');
  const evEl=document.getElementById('calEvents');
  if(!selectedCalDate){
    const up=allTodos.filter(t=>t.date>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
    label.textContent='Upcoming deadlines';
    if(!up.length){evEl.innerHTML=`<div class="cal-empty">No upcoming deadlines</div>`;return;}
    evEl.innerHTML=up.map(t=>`<div class="cal-event-item">
      <div class="cal-event-dot" style="background:${t.color}"></div>
      <div class="cal-event-info"><div class="cal-event-title">${esc(t.text)}</div>
      <div class="cal-event-sub">${esc(t.projName)} · ${esc(t.secName)} · ${formatDate(t.date)}</div></div>
    </div>`).join('');return;
  }
  const d=new Date(selectedCalDate);
  label.textContent=`${d.getMonth()+1}/ ${d.getDate()} — Due`;
  const dayTodos=allTodos.filter(t=>t.date===selectedCalDate);
  if(!dayTodos.length){evEl.innerHTML=`<div class="cal-empty">Nothing due on this day</div>`;return;}
  evEl.innerHTML=dayTodos.map(t=>`<div class="cal-event-item">
    <div class="cal-event-dot" style="background:${t.color}"></div>
    <div class="cal-event-info"><div class="cal-event-title">${esc(t.text)}</div>
    <div class="cal-event-sub">${esc(t.projName)} · ${esc(t.secName)}${t.memo?` · ${esc(t.memo)}`:''}</div></div>
  </div>`).join('');
}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}

/* ─── Notes/Meeting Notes ─── */
function switchMemoType(type){
  currentMemoType=type;
  document.querySelectorAll('.memo-type-btn').forEach((b,i)=>b.classList.toggle('active',['memo','meeting'][i]===type));
  updateMemoExtraFields();renderMemos();
}
function updateMemoExtraFields(){
  const el=document.getElementById('memoExtraFields');if(!el)return;
  if(currentMemoType==='meeting'){
    const projOpts=projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
    el.innerHTML=`<input type="date" class="date-input" id="memoDateInput">
      <select class="sel" id="memoProjInput"><option value="">Link project</option>${projOpts}</select>
      <input class="todo-input" id="memoAttendeesInput" placeholder="Attendees" style="flex:1">`;
  } else { el.innerHTML=''; }
}
function toggleNewMemo(){
  newMemoOpen=!newMemoOpen;
  const f=document.getElementById('newMemoForm');
  f.className='new-memo-form'+(newMemoOpen?' open':'');
  if(newMemoOpen){updateMemoExtraFields();setTimeout(()=>{document.getElementById('memoTitleInput').focus();},50);}
}
function addMemo(){
  const title=document.getElementById('memoTitleInput').value.trim();
  const body=document.getElementById('memoBodyInput').value.trim();
  if(!body&&!title)return;
  const m={id:nextMemoId++,type:currentMemoType,title,body,createdAt:new Date().toISOString()};
  if(currentMemoType==='meeting'){
    const dateEl=document.getElementById('memoDateInput');
    const projEl=document.getElementById('memoProjInput');
    const attEl=document.getElementById('memoAttendeesInput');
    m.date=dateEl?dateEl.value:'';
    m.projId=projEl?parseInt(projEl.value)||null:null;
    m.attendees=attEl?attEl.value.trim():'';
  }
  memos.push(m);
  document.getElementById('memoTitleInput').value='';
  document.getElementById('memoBodyInput').value='';
  toggleNewMemo();save();renderMemos();
}
function deleteMemo(id){memos=memos.filter(m=>m.id!==id);save();renderMemos();}
function renderMemos(){
  const list=document.getElementById('memoList');
  const filtered=memos.filter(m=>(m.type||'memo')===currentMemoType).slice().reverse();
  if(!filtered.length){list.innerHTML=`<div class="cal-empty">${currentMemoType==='meeting'?'No meeting notes yet':'No notes yet'}</div>`;return;}
  list.innerHTML=filtered.map(m=>{
    const isMeeting=m.type==='meeting';
    const proj=isMeeting&&m.projId?projects.find(p=>p.id===m.projId):null;
    const tags=[];
    if(isMeeting&&m.date) tags.push(`📅 ${formatDate(m.date)}`);
    if(isMeeting&&m.attendees) tags.push(`👥 ${esc(m.attendees)}`);
    if(proj) tags.push(esc(proj.name));
    return`<div class="memo-card">
      <div class="memo-card-header">
        <div class="memo-card-meta">
          <div class="memo-card-type" style="background:${isMeeting?'#E6F1FB':'#EEEDFE'};color:${isMeeting?'#0C447C':'#3C3489'}">${isMeeting?'Meeting Notes':'Notes'}</div>
          <div class="memo-card-title">${esc(m.title||'Untitled')}</div>
          ${tags.length?`<div class="memo-card-tags">${tags.map(t=>`<span class="memo-card-tag">${t}</span>`).join('')}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="memo-card-date" style="font-size:11px;color:var(--text3)">${new Date(m.createdAt).toLocaleDateString('en-US')}</span>
          <button class="btn-icon-sm" onclick="deleteMemo(${m.id})">✕</button>
        </div>
      </div>
      <div class="memo-card-body">${esc(m.body)}</div>
    </div>`;
  }).join('');
}


async function resetData(){
  if(!confirm('All data will be deleted. Continue?')) return;
  projects=[];memos=[];
  localStorage.removeItem('nyang_p3');
  localStorage.removeItem('nyang_m3');
  await saveToCloud();
  location.reload();
}

// 앱 시작 시 클라우드에서 불러온 후 렌더


if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});});
}

// 시작 시 클라우드에서 불러오기
loadFromCloud().then(()=>{checkRepeats();render();});
