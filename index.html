<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Cat Dock</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent !important; /* 배경 투명하게 */
            overflow: hidden;
        }
        #mini-cat-dock {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 99999;
            padding-bottom: 10px;
        }
        .mini-cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .mini-cat-img {
            width: 100px; /* 고양이 크기 */
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .mini-status-label {
            font-size: 11px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="mini-cat-dock">
    <div class="mini-cat-item">
        <span class="mini-status-label">치치 활동 중</span>
        <img src="qiqi.png" class="mini-cat-img">
    </div>
    <div class="mini-cat-item">
        <span class="mini-status-label">찌루 휴식 중</span>
        <img src="zziru.png" class="mini-cat-img">
    </div>
    <div class="mini-cat-item">
        <span class="mini-status-label">마루 활동 중</span>
        <img src="maru.png" class="mini-cat-img">
    </div>
</div>

</body>
</html>
